# ──────────────────────────────────────────────────────────
# Character config — Tsu Chocola
# This file tells generate.py which model and LoRA to use.
# ──────────────────────────────────────────────────────────

character_name: Tsu Chocola
trigger_word: "tsu chocola"

# Core character features auto-prepended to every prompt.
# These match the tags used during training so the LoRA fires properly.
# Eye/face tags help pull the LoRA's flame-iris and cheek-diamond detail through.
# Tags MUST match the training captions, otherwise the LoRA's identity
# anchors weakly and generation drifts. Earlier this had "solid black fox
# tail, diamond-shaped pupils, facial mark" — none of those tokens were
# in the new training captions, so the LoRA had no association for them
# and outputs went off the rails.
# NOTE: tsu_chocola needs an artist tag on EVERY prompt. The v2 LoRA's
# training set was 84% grey-bg studio VRChat shots; without an `artist:NAME`
# tag the outputs render plasticky-3D even with the full anime-coloring
# style stack. nardack and ningen are the project's tier-A artists for this
# character. See PROMPTING.md §9.7 (Per-character exceptions).
character_tags: "1girl, solo, fox girl, black fox ears, black fox tail, black hair, red eyes, red feather hair ornament, side braid"

# Character-specific negatives — appended to BASE_NEGATIVE only for this
# character. Used to kill known training artifacts that don't generalize:
# the v2 LoRA was trained on captions where some images had the tail tip
# rendered white or two-tone (a VRChat shader artifact). These tags pull
# the model back to a fully-black tail, matching the canonical look.
# Do NOT add tags here that the character legitimately has — those should
# stay in character_tags instead.
negative_tags: "white tail tip, two-tone tail, multicolored tail"

# Base checkpoint (Illustrious-family SDXL fine-tune, NSFW-capable)
checkpoint: "checkpoints/waiIllustriousSDXL_v170.safetensors"

# Your trained character LoRA
character_lora: "loras/tsu_chocola/tsu_chocola.safetensors"
character_lora_weight: 0.8           # 0.8 = identity stays but model's 2D anime style breathes through

# Optional: stack additional LoRAs (style or other characters)
# Drop style LoRAs in loras\styles\ first.
extra_loras: []
# Example for layering a style on top:
# extra_loras:
#   - path: "F:\\vrfu-ai\\loras\\styles\\flat_colour_anime.safetensors"
#     name: style
#     weight: 0.5

# Sampler — euler_a is the default Illustrious recommendation
sampler: euler_a       # or: dpmpp_2m_karras

# Named outfits for {outfit} / {outfit:name} placeholders in queue prompts.
# A prompt containing {outfit} expands to outfits.default before generation.
# Tags chosen to match what's in the training set so the LoRA fires the correct look.
outfits:
  # The signature look (white camisole + black knit cardigan + black drawstring shorts)
  default: "white camisole, midriff, navel, off-shoulder black knit cardigan, oversized black cardigan, black shorts, drawstring shorts, barefoot, red toenails"

  # Streetwear: black crop top + harness + shorts. Trained with athletic poses.
  harness: "black crop top, midriff, navel, harness, black shorts, arm warmers, barefoot, red toenails"

  # Hoodie casual: black hoodie cropped over crop top + shorts + sneakers
  hoodie: "black hoodie, crop top, midriff, black shorts, drawstring shorts, black sneakers"

  # Sporty: white sports bra + black drawstring shorts + sneakers
  sporty: "white sports bra, midriff, navel, black shorts, drawstring shorts, black sneakers, white socks"

  # Mini dress with arm sleeves + platform/black boots, choker
  dress: "black mini dress, arm sleeves, choker, heart pendant, black boots"

  # Sleeveless bodysuit + detached sleeves (couch/lounge look)
  bodysuit: "black bodysuit, black detached sleeves"

  # Red sweater crop top + harness + shorts
  red_sweater: "red sweater, crop top, midriff, navel, black shorts, harness, black sneakers"

  # Oversized black knit sweater (cozy at-home)
  cozy: "oversized black knit sweater, bare legs, barefoot, red toenails, choker"

  # Striped bikini (black & white)
  bikini: "black and white striped bikini, bikini top, bikini bottom, cleavage"

  # White towel wrapped (post-bath)
  towel: "white towel, towel only, naked towel, bath towel, towel around chest"

  # White camisole + denim shorts (summer casual)
  denim: "white camisole, denim shorts, midriff, navel, barefoot, red toenails"
