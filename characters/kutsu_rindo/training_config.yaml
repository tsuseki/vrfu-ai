---
job: extension
config:
  name: "kutsu_rindo"
  process:
    - type: 'sd_trainer'
      training_folder: "F:\\vrfu-ai\\loras\\characters"
      device: cuda:0
      trigger_word: "kutsu rindo"

      network:
        type: "lora"
        linear: 32
        linear_alpha: 16

      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
        push_to_hub: false

      datasets:
        - folder_path: "F:\\vrfu-ai\\characters\\kutsu_rindo\\training"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [ 512, 768, 1024 ]

      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: true
        gradient_checkpointing: true
        noise_scheduler: "ddpm"
        optimizer: "adamw8bit"
        lr: 1e-4
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16

      model:
        name_or_path: "F:\\vrfu-ai\\checkpoints\\waiIllustriousSDXL_v170.safetensors"
        is_flux: false
        arch: sdxl

      sample:
        sampler: "ddpm"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "kutsu rindo, fox girl, fox ears, white inner ear fur, blonde hair, low twin ponytails, purple eyes, red eyeshadow, thick red blush, red lipstick, heavy makeup, facial mark, red whisker markings, red cheek stripes, forehead mark, white kimono, red hakama, miko, shrine maiden, anime girl, solo, looking at viewer, upper body, white background, masterpiece, best quality"
          - "kutsu rindo, fox girl, fox ears, blonde hair, low twin ponytails, heterochromia, red baseball cap, FATAL CUTIE cap, white crop top, denim micro shorts, arm bandages, leg warmers, anime girl, solo, full body, standing, white background, masterpiece, best quality"
          - "kutsu rindo, fox girl, fox ears, blonde hair, low twin ponytails, purple eyes, red eyeshadow, thick red blush, red lipstick, heavy makeup, facial mark, red whisker markings, red cheek stripes, forehead mark, anime girl, solo, close-up, face focus, smile, white background, masterpiece, best quality"
          - "kutsu rindo, fox girl, fox ears, blonde hair, low twin ponytails, purple eyes, red eyeshadow, thick red blush, red lipstick, heavy makeup, facial mark, red whisker markings, red cheek stripes, forehead mark, anime girl, solo, nude, upper body, white background, masterpiece, best quality"
        neg: "worst quality, low quality, bad anatomy, deformed, blurry, extra limbs, ugly, multiple characters, 2girls"
        seed: 42
        walk_seed: true
        guidance_scale: 7
        sample_steps: 20

meta:
  name: "[name]"
  version: '1.0'
